# electron-builder configuration (kept out of package.json so it survives even
# if package.json is rewritten by tooling). Used by `npm run electron:build`
# and by CI.
appId: dev.nawalelk.dbinterface
productName: DB Interface
npmRebuild: false
directories:
  output: release
  buildResources: build
files:
  - electron/**/*
afterPack: scripts/after-pack.cjs
mac:
  target:
    - dmg
    - zip
  identity: null
  category: public.app-category.developer-tools
  icon: assets/icon.icns
win:
  target:
    - nsis
  icon: assets/icon.ico
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: nawalelk <nawal.dev64@gmail.com>
  icon: assets/icon.png
