# GitLab CI — builds the Linux desktop installers (.AppImage / .deb) on the
# shared runners. macOS and Windows installers need macOS/Windows runners
# (GitLab SaaS macOS runners require a paid tier); add analogous jobs with the
# proper `tags:` there, reusing the same script.
stages:
  - build

build:linux:
  stage: build
  image: electronuserland/builder:latest
  rules:
    - if: $CI_COMMIT_TAG               # a v* tag
    - if: $CI_PIPELINE_SOURCE == "web" # manual "Run pipeline"
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .npm/
  script:
    - npm ci --cache .npm --prefer-offline || npm install --no-audit --no-fund
    - npm run build
    - node scripts/prepare-standalone.mjs
    - npx --no-install electron-builder --linux --publish never
  artifacts:
    name: dbinterface-linux-$CI_COMMIT_SHORT_SHA
    paths:
      - release/*.AppImage
      - release/*.deb
    expire_in: 2 weeks
