name: Build desktop app

# Builds the Electron installers for macOS, Windows and Linux in clean CI
# runners. Trigger manually (Actions tab → Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Prepare standalone (static + Electron-ABI better-sqlite3)
        run: node scripts/prepare-standalone.mjs

      - name: Package with electron-builder
        run: npx --no-install electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: dbinterface-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb

  # When triggered by a v* tag, gather the three OS builds and attach the
  # installers to the corresponding GitHub Release (public download links).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
